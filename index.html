<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARIDAD GESTION</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Gestion de tableau</h1>

<form id="form-tableau">
    <label for="nom">Nom</label>
    <input type="text" id="nom" name="nom" required>

    <label for="prenom">Prénom</label>
    <input type="text" id="prenom" name="prenom" required>

    <label for="adresse">Adresse</label>
    <input type="text" id="adresse" name="adresse" required>

    <label for="numero">Numéro</label>
    <input type="text" id="numero" name="numero" required>

    <label for="metier">Motif</label>
    <input type="text" id="metier" name="metier" required>

    <button type="submit" id="btn-ajouter">Ajouter</button>
</form>

<table id="tableau" border="1">
    <thead>
        <tr>
            <th>Nom</th>
            <th>Prénom</th>
            <th>Adresse</th>
            <th>Numéro tel</th>
            <th>Motif</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody id="liste-tableau">
        <!-- Les lignes seront ajoutées ici en JavaScript -->
    </tbody>
</table>

<script src="script.js"></script>

</body>
</html>
